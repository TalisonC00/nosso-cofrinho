<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Nosso Cofrinho 💍</title>
    
    <link rel="manifest" href="data:application/manifest+json,{'name':'Cofrinho','short_name':'Cofrinho','start_url':'index.html','display':'standalone','background_color':'#0a0a0a','theme_color':'#34c759','icons':[{'src':'icon.jpg','sizes':'512x512','type':'image/jpeg'}]}">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.jpg">

    <style>
        :root { 
            --talison: #34c759; --saiane: #ff33cc; --danger: #ff3b30; --warning: #ffcc00; 
            --bg: #0a0a0a; --card-bg: rgba(28, 28, 30, 0.95); --text: #ffffff;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body { font-family: -apple-system, system-ui, sans-serif; background: #0a0a0a; color: var(--text); margin: 0; padding: 8.15px; padding-top: calc(8.15px + env(safe-area-inset-top)); min-height: 100vh; overflow-x: hidden; }
        
        .glass-card { background: var(--card-bg); backdrop-filter: blur(25px); border: 1.5px solid rgba(255, 255, 255, 0.1); border-radius: 28px; box-shadow: 0 15px 40px rgba(0,0,0,0.6); padding: 18.1px; width: 100%; max-width: 450px; text-align: center; margin: 0 auto; position: relative; }
        
        #conteudo-app { display: none; padding-bottom: calc(115px + env(safe-area-inset-bottom)); animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* MODAL CUSTOMIZADO */
        #custom-modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); z-index: 9999; justify-content: center; align-items: center; }
        .custom-modal { background: #1c1c1e; width: 85%; max-width: 320px; border-radius: 24px; padding: 25px; text-align: center; border: 1px solid var(--saiane); }
        .modal-btn { border: none; padding: 12px; border-radius: 14px; font-weight: 700; cursor: pointer; flex: 1; color: white; }

        .info-box { background: rgba(255,255,255,0.03); border-radius: 22px; padding: 16px; margin-bottom: 14px; border: 1px solid rgba(255,255,255,0.06); text-align: left; }
        .info-line { display: flex; justify-content: space-between; align-items: center; padding: 11px 0; border-bottom: 1px solid rgba(255,255,255,0.05); min-height: 50px; }
        .info-line:last-child { border-bottom: none; }

        /* TAGS PREMIUM CORRIGIDAS */
        .status-tag-premium { font-size: 0.58rem; font-weight: 900; padding: 5px 12px; border-radius: 10px; text-transform: uppercase; display: inline-flex; align-items: center; letter-spacing: 0.5px; }
        .tag-pos { background: rgba(52, 199, 89, 0.2); color: #4cd964; border: 1px solid rgba(76, 217, 100, 0.5); }
        .tag-neg { background: rgba(255, 51, 204, 0.2); color: #ff33cc; border: 1px solid rgba(255, 51, 204, 0.5); }
        .tag-warn { background: rgba(255, 204, 0, 0.2); color: #ffcc00; border: 1px solid rgba(255, 204, 0, 0.5); }
        .tag-danger { background: rgba(255, 59, 48, 0.2); color: #ff3b30; border: 1px solid rgba(255, 59, 48, 0.5); }

        .tab-menu { display: flex; justify-content: space-around; background: rgba(20, 20, 20, 0.98); backdrop-filter: blur(25px); border-radius: 26px; padding: 10px; padding-bottom: calc(10px + env(safe-area-inset-bottom)); position: fixed; bottom: 12px; left: 12px; right: 12px; z-index: 1000; max-width: 430px; margin: 0 auto; border: 1px solid rgba(255,255,255,0.1); }
        .tab-btn { border: none; background: none; color: #555; cursor: pointer; font-size: 0.72rem; display: flex; flex-direction: column; align-items: center; flex: 1; transition: 0.3s; }
        .tab-btn.active.cofre-btn { color: var(--talison); text-shadow: 0 0 12px var(--talison); }
        .tab-btn.active.novo-btn { color: var(--saiane); text-shadow: 0 0 12px var(--saiane); }
        .tab-btn i { font-style: normal; font-size: 1.5rem; margin-bottom: 4px; }

        .barra-bg { background: rgba(255,255,255,0.05); border-radius: 12px; height: 16px; overflow: hidden; margin: 15px 0; border: 1px solid rgba(255,255,255,0.1); }
        .barra-fill { background: linear-gradient(90deg, var(--talison), var(--saiane)); height: 100%; transition: width 1s ease; }

        .logo-app { width: 78px; height: 78px; border-radius: 50%; object-fit: cover; border: 3px solid var(--saiane); box-shadow: 0 0 20px rgba(255, 51, 204, 0.4); margin-bottom: 12px; }
        input, select { background: #1c1c1e; border: 1.5px solid rgba(255,255,255,0.15); color: white; padding: 16px; border-radius: 20px; width: 100%; font-size: 1rem; }
        
        .item { background: rgba(255,255,255,0.03); padding: 16px; margin-bottom: 12px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; text-align: left; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body>

<div id="custom-modal-overlay"><div class="custom-modal"><div id="modal-text" style="color:white; margin-bottom:20px; font-weight:800;"></div><div style="display:flex; gap:10px;"><button class="modal-btn" id="modal-btn-cancel" style="background:#3a3a3c;">Cancelar</button><button class="modal-btn" id="modal-btn-ok" style="background:linear-gradient(to right, var(--talison), var(--saiane));">OK</button></div></div></div>

<div id="tela-login" class="glass-card" style="margin-top: 60px;">
    <div style="font-size: 3.5rem; margin-bottom: 15px;">🔒</div>
    <h2 style="color:white;">Olá Casal! 💍</h2>
    <input type="password" id="senha-input" placeholder="Senha do Cofrinho" style="text-align:center; margin-bottom:20px;">
    <button id="btn-entrar" style="background:linear-gradient(135deg, var(--talison), var(--saiane)); color:white; width:100%; padding:20px; border-radius:22px; border:none; font-weight:900;">ACESSAR</button>
</div>

<div id="conteudo-app">
    <div id="cofre" class="tab-content active">
        <div class="glass-card">
            <button onclick="logout()" style="position:absolute; top:18px; right:18px; border:none; background:none; font-size:1.4rem;">🔒</button>
            <img src="foto.jpg" class="logo-app">
            <h2 style="color:white; font-size:1.4rem; margin-bottom:15px;">Nossos Sonhos 🏡🚗</h2>
            <div class="barra-bg"><div id="barra" class="barra-fill" style="width:0%"></div></div>
            <div id="barra-porcentagem" style="font-size:0.65rem; font-weight:900; color:#8e8e93; text-transform:uppercase;">Calculando...</div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:14px; margin:22px 0;">
                <div style="background:rgba(255,255,255,0.03); padding:16px; border-radius:22px; border:1.5px solid var(--talison);"><small style="display:block; color:#8e8e93; font-weight:900; font-size:0.58rem; margin-bottom:6px;">SALDO GERAL</small><b id="total-geral" style="font-size:1.15rem;">R$ 0,00</b></div>
                <div style="background:rgba(255,255,255,0.03); padding:16px; border-radius:22px; border:1.5px solid var(--saiane);"><small style="display:block; color:#8e8e93; font-weight:900; font-size:0.58rem; margin-bottom:6px;">SALDO MÊS</small><b id="total-mes" style="color:white; font-size:1.15rem;">R$ 0,00</b></div>
            </div>
            <div class="info-box" style="border-top: 4px solid var(--talison);"><span style="font-size:0.65rem; font-weight:900; color:var(--talison); display:block; text-align:center; margin-bottom:12px;">🏆 DEPÓSITOS BRUTOS</span><div id="linhas-bruto"></div></div>
            <div class="info-box" style="border-top: 4px solid var(--saiane);"><span style="font-size:0.65rem; font-weight:900; color:var(--saiane); display:block; text-align:center; margin-bottom:12px;">⚖️ RESUMO INDIVIDUAL</span><div id="linhas-resumo"></div></div>
            <div style="background:rgba(255,255,255,0.03); border-radius:24px; padding:18px; border:2px solid var(--danger);"><b id="soma-retirada" style="font-size:1.25rem; color:var(--danger);">R$ 0,00</b><br><small style="color:var(--danger); font-weight:900; font-size:0.6rem;">⚠️ TOTAL A REPOR</small></div>
        </div>
    </div>

    <div id="novo" class="tab-content">
        <div class="glass-card">
            <h2 style="color:var(--saiane);">Novo Registro 📝</h2>
            <div style="background:rgba(255,255,255,0.03); border-radius:20px; padding:15px; margin-bottom:15px; border:1px solid rgba(255,255,255,0.1); display:flex; align-items:center; gap:10px;">
                <span id="meta-status-tag" class="status-tag-premium">---</span>
                <span id="meta-acumulado" style="margin-left:auto; font-weight:900; color:white;">R$ 0,00</span>
            </div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:15px;"><select id="quem"><option value="Talison">Talison</option><option value="Saiane">Saiane</option></select><input type="month" id="mes-referencia"></div>
            <div style="display:flex; gap:10px;"><button id="btn-sinal-toggle" style="width:70px; height:60px; border-radius:20px; border:none; background:var(--talison); color:white; font-size:2rem;">+</button><input type="number" id="valor-input" inputmode="decimal" placeholder="0,00" style="flex:1;"></div>
            <div id="campo-motivo" style="display:none; margin-top:12px;"><input type="text" id="motivo-retirada" placeholder="Motivo?"></div>
            <button id="btn-registrar" style="width:100%; background:linear-gradient(to right, var(--talison), var(--saiane)); color:white; padding:20px; border-radius:22px; border:none; font-weight:900; margin-top:20px;">CONFIRMAR</button>
        </div>
    </div>

    <div id="metas" class="tab-content">
        <div class="glass-card">
            <h2 style="color:white; margin-bottom:20px;">📊 Metas</h2>
            <div style="display:flex; gap:12px; margin-bottom:25px;">
                <div style="flex:1; padding:16px; border-radius:22px; background:rgba(52,199,89,0.05); border:1.2px solid var(--talison);"><b id="count-ok" style="color:var(--talison); font-size:1.4rem;">0</b><span style="display:block; font-size:0.55rem; color:#8e8e93; font-weight:900;">OK 🟢</span></div>
                <div style="flex:1; padding:16px; border-radius:22px; background:rgba(255,45,85,0.05); border:1.2px solid var(--saiane);"><b id="count-fail" style="color:var(--saiane); font-size:1.4rem;">0</b><span style="display:block; font-size:0.55rem; color:#8e8e93; font-weight:900;">Faltou Foco 🔴</span></div>
            </div>
            <div id="lista-meses"></div>
        </div>
    </div>

    <div id="extrato" class="tab-content">
        <div class="glass-card">
            <h2 style="color:white; margin-bottom:20px;">📜 Histórico</h2>
            <div style="background:rgba(255,255,255,0.03); border-radius:20px; padding:15px; margin-bottom:15px; border:1px solid rgba(255,255,255,0.1); text-align:left;">
                <label style="font-size:0.65rem; font-weight:900; color:#8e8e93; display:block; margin-bottom:8px;">ESCOLHER MÊS:</label>
                <input type="month" id="filtro-extrato-mes">
            </div>
            <div id="lista"></div>
        </div>
    </div>

    <div class="tab-menu">
        <button class="tab-btn cofre-btn active" onclick="openTab('cofre')"><i>💰</i>Cofre</button>
        <button class="tab-btn novo-btn" onclick="openTab('novo')"><i>➕</i>Novo</button>
        <button class="tab-btn metas-btn" onclick="openTab('metas')"><i>📈</i>Metas</button>
        <button class="tab-btn extrato-btn" onclick="openTab('extrato')"><i>📜</i>Extrato</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = { apiKey: "AIzaSyCrorkszGFAUTTN2ZnV8nJ5rpNvFG9d1ow", authDomain: "cofrinho-47422.firebaseapp.com", databaseURL: "https://cofrinho-47422-default-rtdb.firebaseio.com", projectId: "cofrinho-47422", storageBucket: "cofrinho-47422.firebasestorage.app", messagingSenderId: "995544707412", appId: "1:995544707412:web:6a1b1410a24b456de5d8c1" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const dbRef = ref(db, 'movimentacoes');
    const fmt = (v) => v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    let globalMesesMap = {};
    const hoje = new Date();

    const showModal = (text, confirmOnly = false) => {
        return new Promise((resolve) => {
            const overlay = document.getElementById('custom-modal-overlay');
            document.getElementById('modal-text').innerText = text;
            document.getElementById('modal-btn-cancel').style.display = confirmOnly ? 'none' : 'block';
            overlay.style.display = 'flex';
            document.getElementById('modal-btn-ok').onclick = () => { overlay.style.display = 'none'; resolve(true); };
            document.getElementById('modal-btn-cancel').onclick = () => { overlay.style.display = 'none'; resolve(false); };
        });
    };

    document.getElementById('btn-entrar').onclick = async () => {
        if(document.getElementById('senha-input').value === "0202") {
            localStorage.setItem('auth_cofrinho_v96', 'true');
            location.reload();
        } else { await showModal("Senha incorreta!", true); }
    };
    if(localStorage.getItem('auth_cofrinho_v96') === 'true') {
        document.getElementById('tela-login').style.display = 'none';
        document.getElementById('conteudo-app').style.display = 'block';
    }
    window.logout = () => { localStorage.removeItem('auth_cofrinho_v96'); location.reload(); };

    window.openTab = function(tabName) {
        document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(tabName).classList.add('active');
        document.querySelector('.' + tabName + '-btn').classList.add('active');
        if(tabName === 'novo') atualizarIndicadorNovo();
        if(tabName === 'extrato') processarDados();
        window.scrollTo(0,0);
    };

    const inputMes = document.getElementById('mes-referencia'), filtroExtrato = document.getElementById('filtro-extrato-mes');
    const mesPadrao = `${hoje.getFullYear()}-${String(hoje.getMonth() + 1).padStart(2, '0')}`;
    inputMes.value = mesPadrao; filtroExtrato.value = mesPadrao;
    filtroExtrato.onchange = () => processarDados();

    const atualizarIndicadorNovo = () => {
        const [ano, mes] = inputMes.value.split('-');
        const chave = `${parseInt(mes)-1}-${ano}`;
        const saldoMes = globalMesesMap[chave] ? globalMesesMap[chave].val : 0;
        document.getElementById('meta-acumulado').innerText = fmt(saldoMes);
        const tag = document.getElementById('meta-status-tag');
        const isMêsAtual = (parseInt(mes)-1 === hoje.getMonth() && parseInt(ano) === hoje.getFullYear());
        if (saldoMes >= 600) { tag.innerText = "🟢 OK"; tag.className = "status-tag-premium tag-pos"; }
        else if (isMêsAtual) { tag.innerText = "🎯 FOCO"; tag.className = "status-tag-premium tag-warn"; }
        else { tag.innerText = "🔴 Faltou Foco"; tag.className = "status-tag-premium tag-danger"; }
    };
    inputMes.onchange = atualizarIndicadorNovo;

     const valI = document.getElementById('valor-input'), motI = document.getElementById('motivo-retirada'), btnS = document.getElementById('btn-sinal-toggle'), btnR = document.getElementById('btn-registrar');
    btnS.onclick = () => {
        btnS.innerText = btnS.innerText === "+" ? "-" : "+";
        btnS.style.background = btnS.innerText === "+" ? "var(--talison)" : "var(--danger)";
        document.getElementById('campo-motivo').style.display = btnS.innerText === "+" ? "none" : "block";
    };

    btnR.onclick = async () => {
        let v = parseFloat(valI.value);
        if (isNaN(v)) return await showModal("Insira um valor.", true);
        if (btnS.innerText === "-") v = -v;
        const [anoSel, mesSel] = inputMes.value.split('-');
        btnR.disabled = true;
        push(dbRef, { quem: document.getElementById('quem').value, valor: v, motivo: v < 0 ? motI.value : "", data: new Date(anoSel, mesSel - 1, 15).toLocaleDateString('pt-BR'), ts: Date.now(), mes: parseInt(mesSel) - 1, ano: parseInt(anoSel) }).then(() => {
            valI.value = ""; motI.value = ""; btnR.disabled = false; openTab('extrato');
        });
    };

    function processarDados() {
        onValue(dbRef, (snap) => {
            const dados = snap.val();
            let saldoG = 0, depT = 0, depS = 0, retT = 0, retS = 0, mesesMap = {};
            const listaEl = document.getElementById('lista'); listaEl.innerHTML = "";
            const [fAno, fMes] = filtroExtrato.value.split('-').map(Number);
            if (dados) {
                Object.entries(dados).sort((a,b) => b[1].ts - a[1].ts).forEach(([key, m]) => {
                    const v = m.valor; saldoG += v;
                    if (v >= 0) { m.quem === "Talison" ? depT += v : depS += v; }
                    else { m.quem === "Talison" ? retT += Math.abs(v) : retS += Math.abs(v); }
                    const idMes = `${m.mes}-${m.ano}`;
                    if (!mesesMap[idMes]) mesesMap[idMes] = { val: 0, m: m.mes, a: m.ano };
                    mesesMap[idMes].val += v;
                    if (m.mes === (fMes - 1) && m.ano === fAno) {
                        const div = document.createElement('div');
                        div.className = 'item'; div.style.borderLeft = `5px solid ${v>=0?(m.quem==='Talison'?'var(--talison)':'var(--saiane)'):'var(--danger)'}`;
                        div.innerHTML = `<div style="display:flex; justify-content:space-between; align-items:center;"><span>${m.quem}</span><b style="color:${v>=0?'#fff':'var(--danger)'}">${v < 0 ? '-' : ''}${fmt(Math.abs(v))}</b></div><div style="font-size:0.78rem; color:#8e8e93; margin-top:6px;">${v<0?'⚠️ ':''}${m.motivo||'Depósito'}</div>`;
                        div.onclick = async () => { if(await showModal("Apagar este registro?")) remove(ref(db, `movimentacoes/${key}`)); };
                        listaEl.appendChild(div);
                    }
                });
            }
            globalMesesMap = mesesMap; atualizarIndicadorNovo();
            document.getElementById('barra').style.width = Math.min((saldoG/8000)*100, 100) + "%";
            document.getElementById('barra-porcentagem').innerText = `FALTAM ${(100-(saldoG/8000)*100).toFixed(1)}% PARA A META`;
            document.getElementById('total-geral').innerText = fmt(saldoG);
            document.getElementById('total-mes').innerText = fmt(mesesMap[`${hoje.getMonth()}-${hoje.getFullYear()}`]?.val || 0);
            document.getElementById('soma-retirada').innerText = fmt(retT + retS);
            
            const totalBruto = depT + depS || 1;
            document.getElementById('linhas-bruto').innerHTML = `<div class="info-line"><span>Talison</span><b style="color:var(--talison)">${fmt(depT)} <small style="color:#8e8e93;">(${((depT/totalBruto)*100).toFixed(0)}%)</small></b></div><div class="info-line"><span>Saiane</span><b style="color:var(--saiane)">${fmt(depS)} <small style="color:#8e8e93;">(${((depS/totalBruto)*100).toFixed(0)}%)</small></b></div>`;
            const lT = depT-retT, lS = depS-retS;
            document.getElementById('linhas-resumo').innerHTML = `
                <div class="info-line"><span>Talison</span><b>${fmt(lT)} <span class="status-tag-premium ${lT>=0?'tag-pos':'tag-neg'}">${lT>=0?'POSITIVO':'DÉBITO'}</span></b></div>
                <div class="info-line"><span>Saiane</span><b>${fmt(lS)} <span class="status-tag-premium ${lS>=0?'tag-pos':'tag-neg'}">${lS>=0?'POSITIVO':'DÉBITO'}</span></b></div>`;
            
            const listaMeses = document.getElementById('lista-meses'); listaMeses.innerHTML = "";
            const nomesM = ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
            let okCount = 0, failCount = 0;
            Object.values(mesesMap).sort((a,b) => (b.a * 12 + b.m) - (a.a * 12 + a.m)).forEach(d => {
                const ok = d.val >= 600;
                const isAtu = (d.m === hoje.getMonth() && d.a === hoje.getFullYear());
                let tagC = "tag-warn", tagL = "🎯 FOCO";
                if (ok) { tagC = "tag-pos"; tagL = "🟢 OK"; okCount++; }
                else if (!isAtu) { tagC = "tag-danger"; tagL = "🔴 Faltou Foco"; failCount++; }
                listaMeses.innerHTML += `<div style="display:flex; justify-content:space-between; align-items:center; padding:13px 0; border-bottom:1px solid rgba(255,255,255,0.05);"><span><b>${nomesM[d.m]} / ${d.a}</b> <span class="status-tag-premium ${tagC}" style="margin-left:10px;">${tagL}</span></span><b>${fmt(d.val)}</b></div>`;
            });
            document.getElementById('count-ok').innerText = okCount;
            document.getElementById('count-fail').innerText = failCount;
        });
    }
    processarDados();
</script>
</body>
</html>
