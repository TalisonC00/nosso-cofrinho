<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cofrinho Talison & Saiane</title>
    
    <link rel="manifest" href="data:application/manifest+json,{'name':'Cofrinho','short_name':'Cofrinho','start_url':'index.html','display':'standalone','background_color':'#f2f2f7','theme_color':'#34c759','icons':[{'src':'icon.jpg','sizes':'512x512','type':'image/jpeg'}]}">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.jpg">

    <style>
        :root { 
            --primary: #34c759; --secondary: #007aff; --danger: #ff3b30; --warning: #ffcc00; 
            --bg: #f2f2f7; --card-bg: rgba(255, 255, 255, 0.98); 
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body { font-family: -apple-system, system-ui, sans-serif; background: linear-gradient(180deg, #f2f2f7 0%, #d1d1d6 100%); margin: 0; padding: 8.15px; min-height: 100vh; overflow-x: hidden; }
        
        .glass-card { background: var(--card-bg); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.7); border-radius: 23px; box-shadow: 0 10px 30px rgba(0,0,0,0.06); padding: 16.1px; width: 100%; max-width: 450px; text-align: center; margin: 0 auto; position: relative; }
        
        #conteudo-app { display: none; padding-bottom: calc(91px + env(safe-area-inset-bottom)); animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* MODAL PERSONALIZADO */
        #custom-modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); z-index: 9999; justify-content: center; align-items: center; }
        .custom-modal { background: white; width: 85%; max-width: 320px; border-radius: 20px; padding: 25px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.2); }
        .modal-msg { font-size: 1.05rem; font-weight: 600; color: #1c1c1e; margin-bottom: 20px; line-height: 1.4; }
        .modal-btns { display: flex; gap: 10px; justify-content: center; }
        .modal-btn { border: none; padding: 12px 25px; border-radius: 12px; font-weight: 800; font-size: 0.95rem; cursor: pointer; flex: 1; }
        .btn-confirm { background: var(--primary); color: white; }
        .btn-cancel { background: #f2f2f7; color: #8e8e93; }

        /* ABAS E NAVEGAÇÃO */
        .tab-menu { display: flex; justify-content: space-around; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(15px); border-radius: 20px; padding: 7.1px; padding-bottom: calc(7.1px + env(safe-area-inset-bottom)); box-shadow: 0 -5px 15px rgba(0,0,0,0.05); position: fixed; bottom: 10.1px; left: 10.1px; right: 10.1px; z-index: 1000; max-width: 430px; margin: 0 auto; }
        .tab-btn { border: none; background: none; padding: 7.1px; border-radius: 14px; font-weight: 700; color: #8e8e93; cursor: pointer; font-size: 0.78rem; display: flex; flex-direction: column; align-items: center; flex: 1; }
        .tab-btn.active { background: var(--primary); color: #fff; }
        .tab-btn i { font-style: normal; font-size: 1.24rem; margin-bottom: 2px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* COFRE PREMIUM */
        .logo-app { width: 67px; height: 67px; border-radius: 50%; object-fit: cover; border: 2.5px solid #fff; margin-bottom: 7.1px; }
        h2 { font-size: 1.23rem; margin: 5px 0; font-weight: 800; color: #1c1c1e; }
        .meta-pill { display: inline-flex; align-items: center; background: linear-gradient(135deg, rgba(52, 199, 89, 0.1) 0%, rgba(52, 199, 89, 0.05) 100%); padding: 6.1px 16.2px; border-radius: 50px; border: 1px solid rgba(52, 199, 89, 0.2); margin-bottom: 10.1px; }
        .meta-pill span { color: var(--primary); font-weight: 900; font-size: 0.8rem; text-transform: uppercase; }
        .barra-bg { background: rgba(0,0,0,0.06); border-radius: 9px; height: 11.2px; overflow: hidden; margin-top: 10.1px; }
        .barra-fill { background: linear-gradient(90deg, #34c759, #4cd964); height: 100%; width: 0%; transition: width 1.5s ease-out; }
        .barra-info { font-size: 0.66rem; font-weight: 800; color: #8e8e93; margin-top: 6.1px; text-transform: uppercase; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 9.2px; margin: 12.2px 0; }
        .stat-card { background: #fff; padding: 10.2px; border-radius: 14.2px; border: 1.52px solid #1c1c1e; }
        .stat-card span { font-weight: 800; font-size: 0.92rem; display: block; }
        .info-box { background: #fff; border-radius: 20px; padding: 14.2px; margin-bottom: 12.2px; border: 1px solid rgba(0,0,0,0.04); text-align: left; }
        .section-title { font-size: 0.68rem; font-weight: 800; color: #b0b0b5; text-transform: uppercase; margin-bottom: 10.2px; display: block; text-align: center; }
        .info-line { display: flex; justify-content: space-between; align-items: center; padding: 8.2px 0; border-bottom: 1px solid #f2f2f7; }
        .info-line:last-child { border-bottom: none; }

        /* TAGS PREMIUM */
        .status-tag-premium { font-size: 0.6rem; font-weight: 800; padding: 3.5px 8.6px; border-radius: 7px; text-transform: uppercase; }
        .tag-pos { background: rgba(52, 199, 89, 0.12); color: #248a3d; border: 1px solid rgba(52, 199, 89, 0.2); }
        .tag-neg { background: rgba(255, 59, 48, 0.12); color: #d63027; border: 1px solid rgba(255, 59, 48, 0.2); }
        .tag-warn { background: rgba(255, 149, 0, 0.12); color: #c27200; border: 1px solid rgba(255, 149, 0, 0.2); }
        .tag-danger { background: rgba(255, 59, 48, 0.12); color: #ff3b30; border: 1px solid rgba(255, 59, 48, 0.2); }

        /* EXTRATO AGRUPADO */
        .mes-header { font-size: 0.7rem; font-weight: 800; color: #b0b0b5; text-transform: uppercase; text-align: left; margin: 15px 0 10px 5px; border-left: 3px solid var(--primary); padding-left: 8px; }
        .item { background: #fff; padding: 14.1px; margin-bottom: 10.1px; border-left: 5px solid #ccc; border-radius: 15px; cursor: pointer; text-align: left; }
        .linha-topo { display: grid; grid-template-columns: auto 1fr auto; align-items: center; gap: 8.1px; width: 100%; }
        .valor-txt { font-weight: 800; font-size: 1.02rem; text-align: right; }
        input, select { border: 1px solid #e5e5ea; background: #f9f9fb; font-weight: 600; padding: 14.1px; border-radius: 15px; width: 100%; font-size: 0.92rem; -webkit-appearance: none; }

        /* DASHBOARD METAS */
        .dash-metas { display: flex; gap: 10px; margin-bottom: 20px; }
        .dash-card { flex: 1; padding: 12px; border-radius: 15px; background: #fff; border: 1px solid #f2f2f7; text-align: center; }
        .dash-card b { display: block; font-size: 1.2rem; }
        .dash-card span { font-size: 0.55rem; font-weight: 800; color: #8e8e93; text-transform: uppercase; }
    </style>
</head>
<body>

<div id="custom-modal-overlay">
    <div class="custom-modal">
        <div class="modal-msg" id="modal-text">Deseja apagar?</div>
        <div class="modal-btns">
            <button class="modal-btn btn-cancel" id="modal-btn-cancel">Cancelar</button>
            <button class="modal-btn btn-confirm" id="modal-btn-ok">OK</button>
        </div>
    </div>
</div>

<div id="tela-login" class="glass-card" style="margin-top: 60px;">
    <div style="font-size: 2.8rem; margin-bottom: 10px;">🔐</div>
    <h2>Olá Casal! 💍</h2>
    <input type="password" id="senha-input" placeholder="Senha do Cofrinho" style="text-align:center;">
    <button id="btn-entrar" style="background:#1c1c1e; color:white; width:100%; padding:17px; border-radius:16px; margin-top:15px; border:none; font-weight:800;">Digite senha de acesso</button>
</div>

<div id="conteudo-app">
    <div id="cofre" class="tab-content active">
        <div class="glass-card">
            <button onclick="logout()" style="position:absolute; top:12px; right:12px; border:none; background:none; font-size:1.2rem;">🔒</button>
            <img src="foto.jpg" class="logo-app" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2170/2170321.png'">
            <h2>Nossos Sonhos 🏡🚗</h2>
            <div class="meta-pill"><span>🎯 Meta: R$ 8.000,00</span></div>
            <div class="barra-bg"><div id="barra" class="barra-fill"></div></div>
            <div id="barra-porcentagem" class="barra-info">Calculando...</div>
            <div class="stats-grid">
                <div class="stat-card"><span id="total-geral">R$ 0,00</span><small>Saldo Geral</small></div>
                <div class="stat-card"><span id="total-mes" style="color: var(--secondary);">R$ 0,00</span><small>Saldo Mês</small></div>
            </div>
            <div class="info-box" style="border: 1px solid var(--primary);"><span class="section-title">🏆 Depósitos Brutos</span><div id="linhas-bruto"></div></div>
            <div class="info-box" style="border: 1px solid var(--warning);"><span class="section-title">⚖️ Resumo Individual</span><div id="linhas-resumo"></div></div>
            <div style="text-align: center; background: #fff; border-radius: 20px; padding: 15.1px; border: 2.2px solid var(--danger);"><b id="soma-retirada" style="font-size:1.12rem; color:var(--danger);">R$ 0,00</b><br><small style="color:var(--danger); font-weight:800; font-size:0.62rem; text-transform:uppercase;">⚠️ Valor total a repor</small></div>
        </div>
    </div>

    <div id="novo" class="tab-content">
        <div class="glass-card">
            <h2>Novo Registro</h2>
            <div id="meta-container-novo" style="display:flex; align-items:center; gap:8.1px; padding:12.1px; background:#f4f7ff; border-radius:15px; margin-bottom:15.1px;">
                <small style="font-size:0.67rem; font-weight:800; color:#8e8e93;">META:</small>
                <span id="meta-status-tag" class="status-tag-premium">---</span>
                <span id="meta-acumulado" style="margin-left:auto; font-weight:800; font-size:0.97rem;">R$ 0,00</span>
            </div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10.1px; margin-bottom:10.1px;"><select id="quem"><option value="Talison">Talison</option><option value="Saiane">Saiane</option></select><input type="month" id="mes-referencia"></div>
            <div style="display:flex; gap:10.1px; margin-bottom:10.1px;"><button id="btn-sinal-toggle" style="width:60px; height:55px; border-radius:15px; border:none; background:var(--primary); color:white; font-size:1.7rem;">+</button><input type="number" id="valor-input" inputmode="decimal" placeholder="0,00" style="flex:1;"></div>
            <div id="campo-motivo" style="display:none; margin-bottom:10.1px;"><input type="text" id="motivo-retirada" placeholder="Qual o motivo?"></div>
            <button id="btn-registrar" style="width:100%; background:var(--primary); color:white; padding:19px; border-radius:16px; border:none; font-weight:800;">Confirmar Registro</button>
        </div>
    </div>

    <div id="metas" class="tab-content">
        <div class="glass-card">
            <h2>📊 Dashboard de Metas</h2>
            <div class="dash-metas">
                <div class="dash-card"><b id="count-ok" style="color: var(--primary);">0</b><span>Meses OK ✅</span></div>
                <div class="dash-card"><b id="count-fail" style="color: var(--danger);">0</b><span>Faltou Foco 🔴</span></div>
            </div>
            <div id="lista-meses"></div>
        </div>
    </div>

    <div id="extrato" class="tab-content"><div class="glass-card"><h2>📜 Extrato</h2><div id="lista"></div></div></div>

    <div class="tab-menu">
        <button class="tab-btn cofre-btn active" onclick="openTab('cofre')"><i>💰</i>Cofre</button>
        <button class="tab-btn novo-btn" onclick="openTab('novo')"><i>➕</i>Novo</button>
        <button class="tab-btn metas-btn" onclick="openTab('metas')"><i>📈</i>Metas</button>
        <button class="tab-btn extrato-btn" onclick="openTab('extrato')"><i>📜</i>Extrato</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = { apiKey: "AIzaSyCrorkszGFAUTTN2ZnV8nJ5rpNvFG9d1ow", authDomain: "cofrinho-47422.firebaseapp.com", databaseURL: "https://cofrinho-47422-default-rtdb.firebaseio.com", projectId: "cofrinho-47422", storageBucket: "cofrinho-47422.firebasestorage.app", messagingSenderId: "995544707412", appId: "1:995544707412:web:6a1b1410a24b456de5d8c1" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const dbRef = ref(db, 'movimentacoes');
    const fmt = (v) => v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    let globalMesesMap = {};
    const hoje = new Date();

    const showModal = (text, confirmOnly = false) => {
        return new Promise((resolve) => {
            const overlay = document.getElementById('custom-modal-overlay');
            const btnCancel = document.getElementById('modal-btn-cancel');
            document.getElementById('modal-text').innerText = text;
            btnCancel.style.display = confirmOnly ? 'none' : 'block';
            overlay.style.display = 'flex';
            document.getElementById('modal-btn-ok').onclick = () => { overlay.style.display = 'none'; resolve(true); };
            btnCancel.onclick = () => { overlay.style.display = 'none'; resolve(false); };
        });
    };

    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(() => {});

    document.getElementById('btn-entrar').onclick = async () => {
        if(document.getElementById('senha-input').value === "0202") {
            localStorage.setItem('auth_cofrinho_final', 'true');
            location.reload();
        } else { await showModal("Senha incorreta!", true); }
    };
    if(localStorage.getItem('auth_cofrinho_final') === 'true') {
        document.getElementById('tela-login').style.display = 'none';
        document.getElementById('conteudo-app').style.display = 'block';
    }
    window.logout = () => { localStorage.removeItem('auth_cofrinho_final'); location.reload(); };

    window.openTab = function(tabName) {
        document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(tabName).classList.add('active');
        document.querySelector('.' + tabName + '-btn').classList.add('active');
        if(tabName === 'novo') atualizarIndicadorNovo();
    };

    const inputMes = document.getElementById('mes-referencia');
    inputMes.value = `${hoje.getFullYear()}-${String(hoje.getMonth() + 1).padStart(2, '0')}`;

    const atualizarIndicadorNovo = () => {
        const [ano, mes] = inputMes.value.split('-');
        const chave = `${parseInt(mes)-1}-${ano}`;
        const saldoMes = globalMesesMap[chave] ? globalMesesMap[chave].val : 0;
        document.getElementById('meta-acumulado').innerText = fmt(saldoMes);
        const tag = document.getElementById('meta-status-tag');
        const isMêsAtual = (parseInt(mes)-1 === hoje.getMonth() && parseInt(ano) === hoje.getFullYear());
        if (saldoMes >= 600) { tag.innerText = "✅ OK"; tag.className = "status-tag-premium tag-pos"; }
        else if (isMêsAtual) { tag.innerText = "🎯 FOCO"; tag.className = "status-tag-premium tag-warn"; }
        else { tag.innerText = "🔴 Faltou Foco"; tag.className = "status-tag-premium tag-danger"; }
    };
    inputMes.onchange = atualizarIndicadorNovo;

    const valI = document.getElementById('valor-input'), motI = document.getElementById('motivo-retirada'), btnS = document.getElementById('btn-sinal-toggle'), btnR = document.getElementById('btn-registrar');
    btnS.onclick = () => {
        btnS.innerText = btnS.innerText === "+" ? "-" : "+";
        btnS.style.background = btnS.innerText === "+" ? "var(--primary)" : "var(--danger)";
        document.getElementById('campo-motivo').style.display = btnS.innerText === "+" ? "none" : "block";
    };

    btnR.onclick = async () => {
        let v = parseFloat(valI.value);
        if (isNaN(v)) return await showModal("Insira um valor.", true);
        if (btnS.innerText === "-") v = -v;
        const [anoSel, mesSel] = inputMes.value.split('-');
        btnR.disabled = true;
        push(dbRef, { quem: document.getElementById('quem').value, valor: v, motivo: v < 0 ? motI.value : "", data: new Date(anoSel, mesSel - 1, 15).toLocaleDateString('pt-BR'), ts: Date.now(), mes: parseInt(mesSel) - 1, ano: parseInt(anoSel) }).then(() => {
            valI.value = ""; motI.value = ""; btnR.disabled = false; openTab('extrato');
        });
    };

    onValue(dbRef, (snap) => {
        const dados = snap.val();
        let saldoG = 0, depT = 0, depS = 0, retT = 0, retS = 0, mesesMap = {}, agrupado = {};
        const listaEl = document.getElementById('lista'); listaEl.innerHTML = "";
        const nomesM = ["janeiro","fevereiro","março","abril","maio","junho","julho","agosto","setembro","outubro","novembro","dezembro"];

        if (dados) {
            Object.entries(dados).sort((a,b) => b[1].ts - a[1].ts).forEach(([key, m]) => {
                const v = m.valor; saldoG += v;
                if (v >= 0) { m.quem === "Talison" ? depT += v : depS += v; }
                else { m.quem === "Talison" ? retT += Math.abs(v) : retS += Math.abs(v); }
                const idMes = `${m.mes}-${m.ano}`;
                if (!mesesMap[idMes]) mesesMap[idMes] = { val: 0, m: m.mes, a: m.ano };
                mesesMap[idMes].val += v;

                if (!agrupado[idMes]) agrupado[idMes] = { title: `${nomesM[m.mes]} de ${m.ano}`, items: [] };
                agrupado[idMes].items.push({ key, ...m });
            });

            // GERA O EXTRATO ORGANIZADO
            Object.keys(agrupado).sort((a,b) => {
                const [m1, a1] = a.split('-').map(Number);
                const [m2, a2] = b.split('-').map(Number);
                return (a2 * 12 + m2) - (a1 * 12 + m1);
            }).forEach(id => {
                const header = document.createElement('div');
                header.className = 'mes-header'; header.innerText = agrupado[id].title;
                listaEl.appendChild(header);
                agrupado[id].items.forEach(m => {
                    const div = document.createElement('div');
                    div.className = 'item'; div.style.borderLeftColor = m.valor >= 0 ? 'var(--primary)' : 'var(--danger)';
                    div.innerHTML = `<div class="linha-topo"><span class="data-txt">${m.data}</span><span class="nome-txt" style="font-weight:700;">${m.quem}</span><span class="valor-txt" style="color:${m.valor>=0?'#34c759':'#ff3b30'}">${m.valor < 0 ? '-' : ''}${fmt(Math.abs(m.valor))}</span></div><div style="font-size:0.83rem; color:#8e8e93; border-top:1px solid #f8f8f8; padding-top:6px; margin-top:5px;">${m.valor<0?'⚠️ ':''}${m.motivo||'Depósito'}</div>`;
                    div.onclick = async () => { if(await showModal("Apagar registro?")) remove(ref(db, `movimentacoes/${m.key}`)); };
                    listaEl.appendChild(div);
                });
            });
        }
        globalMesesMap = mesesMap; atualizarIndicadorNovo();
        const prog = (saldoG / 8000) * 100;
        document.getElementById('barra').style.width = Math.min(prog, 100) + "%";
        document.getElementById('barra-porcentagem').innerText = `FALTAM ${(100-prog).toFixed(1)}% PARA A META`;
        document.getElementById('total-geral').innerText = fmt(saldoG);
        document.getElementById('total-mes').innerText = fmt(mesesMap[`${hoje.getMonth()}-${hoje.getFullYear()}`]?.val || 0);
        document.getElementById('soma-retirada').innerText = fmt(retT + retS);
        const totalDep = depT + depS;
        document.getElementById('linhas-bruto').innerHTML = `<div class="info-line"><span>Talison</span><b>${fmt(depT)} <span class="status-tag-premium" style="background:rgba(0,0,0,0.03); color:#8e8e93; border:none;">${totalDep?((depT/totalDep)*100).toFixed(0):0}%</span></b></div><div class="info-line"><span>Saiane</span><b>${fmt(depS)} <span class="status-tag-premium" style="background:rgba(0,0,0,0.03); color:#8e8e93; border:none;">${totalDep?((depS/totalDep)*100).toFixed(0):0}%</span></b></div>`;
        const lT = depT-retT, lS = depS-retS;
        document.getElementById('linhas-resumo').innerHTML = `<div class="info-line"><span>Talison</span><b>${fmt(lT)} <span class="status-tag-premium ${lT>=0?'tag-pos':'tag-neg'}">${lT>=0?'POSITIVO':'DÉBITO'}</span></b></div><div class="info-line"><span>Saiane</span><b>${fmt(lS)} <span class="status-tag-premium ${lS>=0?'tag-pos':'tag-neg'}">${lS>=0?'POSITIVO':'DÉBITO'}</span></b></div>`;

        const listaMeses = document.getElementById('lista-meses'); listaMeses.innerHTML = "";
        let okCount = 0, failCount = 0;
        Object.values(mesesMap).sort((a,b) => (b.a * 12 + b.m) - (a.a * 12 + a.m)).forEach(d => {
            const ok = d.val >= 600;
            const isAtual = (d.m === hoje.getMonth() && d.a === hoje.getFullYear());
            let tagC = "tag-warn", tagL = "🎯 FOCO";
            if (ok) { tagC = "tag-pos"; tagL = "✅ OK"; okCount++; }
            else if (!isAtual) { tagC = "tag-danger"; tagL = "🔴 Faltou Foco"; failCount++; }
            listaMeses.innerHTML += `<div class="mes-row" style="display:flex; justify-content:space-between; align-items:center; padding:12px 0; border-bottom:1px solid #f2f2f7;"><span><b>${nomesM[d.m]} / ${d.a}</b> <span class="status-tag-premium ${tagC}" style="margin-left:8px;">${tagL}</span></span><b>${fmt(d.val)}</b></div>`;
        });
        document.getElementById('count-ok').innerText = okCount;
        document.getElementById('count-fail').innerText = failCount;
    });
</script>
</body>
</html>
